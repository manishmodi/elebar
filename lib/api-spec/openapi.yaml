openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Elebhar Fleet Management System API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: vehicles
    description: Vehicle management
  - name: riders
    description: Rider management
  - name: assignments
    description: Rider-vehicle assignments
  - name: dailyLogs
    description: Daily operations tracking
  - name: attendance
    description: Attendance management
  - name: maintenance
    description: Maintenance management
  - name: dashboard
    description: Dashboard and analytics

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /vehicles:
    get:
      operationId: listVehicles
      tags: [vehicles]
      summary: List all vehicles
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [active, maintenance, inactive]
        - name: search
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of vehicles
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Vehicle"
    post:
      operationId: createVehicle
      tags: [vehicles]
      summary: Add a new vehicle
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateVehicle"
      responses:
        "201":
          description: Vehicle created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Vehicle"

  /vehicles/{id}:
    get:
      operationId: getVehicle
      tags: [vehicles]
      summary: Get vehicle by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Vehicle details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Vehicle"
    put:
      operationId: updateVehicle
      tags: [vehicles]
      summary: Update vehicle
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateVehicle"
      responses:
        "200":
          description: Vehicle updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Vehicle"
    delete:
      operationId: deleteVehicle
      tags: [vehicles]
      summary: Delete vehicle
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Vehicle deleted

  /riders:
    get:
      operationId: listRiders
      tags: [riders]
      summary: List all riders
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [active, inactive]
        - name: search
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of riders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Rider"
    post:
      operationId: createRider
      tags: [riders]
      summary: Add a new rider
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateRider"
      responses:
        "201":
          description: Rider created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Rider"

  /riders/{id}:
    get:
      operationId: getRider
      tags: [riders]
      summary: Get rider by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Rider details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Rider"
    put:
      operationId: updateRider
      tags: [riders]
      summary: Update rider
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateRider"
      responses:
        "200":
          description: Rider updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Rider"
    delete:
      operationId: deleteRider
      tags: [riders]
      summary: Delete rider
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Rider deleted

  /assignments:
    get:
      operationId: listAssignments
      tags: [assignments]
      summary: List all assignments
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [active, ended]
        - name: riderId
          in: query
          schema:
            type: integer
        - name: vehicleId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of assignments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Assignment"
    post:
      operationId: createAssignment
      tags: [assignments]
      summary: Create a new assignment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAssignment"
      responses:
        "201":
          description: Assignment created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Assignment"

  /assignments/{id}:
    put:
      operationId: updateAssignment
      tags: [assignments]
      summary: Update assignment
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAssignment"
      responses:
        "200":
          description: Assignment updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Assignment"
    delete:
      operationId: deleteAssignment
      tags: [assignments]
      summary: Delete assignment
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Assignment deleted

  /daily-logs:
    get:
      operationId: listDailyLogs
      tags: [dailyLogs]
      summary: List daily logs
      parameters:
        - name: riderId
          in: query
          schema:
            type: integer
        - name: vehicleId
          in: query
          schema:
            type: integer
        - name: startDate
          in: query
          schema:
            type: string
            format: date
        - name: endDate
          in: query
          schema:
            type: string
            format: date
      responses:
        "200":
          description: List of daily logs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DailyLog"
    post:
      operationId: createDailyLog
      tags: [dailyLogs]
      summary: Create a daily log entry
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDailyLog"
      responses:
        "201":
          description: Daily log created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DailyLog"

  /daily-logs/{id}:
    put:
      operationId: updateDailyLog
      tags: [dailyLogs]
      summary: Update daily log
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDailyLog"
      responses:
        "200":
          description: Daily log updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DailyLog"
    delete:
      operationId: deleteDailyLog
      tags: [dailyLogs]
      summary: Delete daily log
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Daily log deleted

  /attendance:
    get:
      operationId: listAttendance
      tags: [attendance]
      summary: List attendance records
      parameters:
        - name: riderId
          in: query
          schema:
            type: integer
        - name: vehicleId
          in: query
          schema:
            type: integer
        - name: startDate
          in: query
          schema:
            type: string
            format: date
        - name: endDate
          in: query
          schema:
            type: string
            format: date
      responses:
        "200":
          description: List of attendance records
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Attendance"
    post:
      operationId: createAttendance
      tags: [attendance]
      summary: Record attendance
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAttendance"
      responses:
        "201":
          description: Attendance recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Attendance"

  /attendance/{id}:
    put:
      operationId: updateAttendance
      tags: [attendance]
      summary: Update attendance
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAttendance"
      responses:
        "200":
          description: Attendance updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Attendance"
    delete:
      operationId: deleteAttendance
      tags: [attendance]
      summary: Delete attendance record
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Attendance record deleted

  /maintenance:
    get:
      operationId: listMaintenance
      tags: [maintenance]
      summary: List maintenance records
      parameters:
        - name: vehicleId
          in: query
          schema:
            type: integer
        - name: type
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of maintenance records
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Maintenance"
    post:
      operationId: createMaintenance
      tags: [maintenance]
      summary: Create maintenance record
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateMaintenance"
      responses:
        "201":
          description: Maintenance record created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Maintenance"

  /maintenance/{id}:
    put:
      operationId: updateMaintenance
      tags: [maintenance]
      summary: Update maintenance record
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateMaintenance"
      responses:
        "200":
          description: Maintenance record updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Maintenance"
    delete:
      operationId: deleteMaintenance
      tags: [maintenance]
      summary: Delete maintenance record
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Maintenance record deleted

  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: Get fleet dashboard summary
      responses:
        "200":
          description: Dashboard summary data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /dashboard/rider/{riderId}:
    get:
      operationId: getRiderDashboard
      tags: [dashboard]
      summary: Get rider performance dashboard
      parameters:
        - name: riderId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Rider dashboard data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RiderDashboard"

  /dashboard/vehicle/{vehicleId}:
    get:
      operationId: getVehicleDashboard
      tags: [dashboard]
      summary: Get vehicle performance dashboard
      parameters:
        - name: vehicleId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Vehicle dashboard data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VehicleDashboard"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Vehicle:
      type: object
      required: [id, vehicleNumber, plateNumber, status]
      properties:
        id:
          type: integer
        vehicleNumber:
          type: string
        plateNumber:
          type: string
        vehicleType:
          type: string
        brand:
          type: string
        model:
          type: string
        manufactureYear:
          type: integer
        color:
          type: string
        purchaseDate:
          type: string
        purchaseCost:
          type: string
        batteryDetails:
          type: string
        insuranceExpiry:
          type: string
        insuranceIssueDate:
          type: string
        taxExpiry:
          type: string
        serviceDueDate:
          type: string
        lastServiceDate:
          type: string
        lastServiceOdometer:
          type: integer
        servicingPayment:
          type: string
        odometerReading:
          type: string
        status:
          type: string
          enum: [active, maintenance, inactive]
        locationBranch:
          type: string
        gpsInstalled:
          type: string
        gpsNumber:
          type: string
        gpsIdPassword:
          type: string
        scooterBranding:
          type: string
        yangoBrandingDate:
          type: string
        brandingPayment:
          type: string
        brandwrapExpireDate:
          type: string
        bluebookIssueDate:
          type: string
        bluebookExpiryDate:
          type: string
        createdAt:
          type: string

    CreateVehicle:
      type: object
      required: [plateNumber, status]
      properties:
        vehicleNumber:
          type: string
          readOnly: true
        plateNumber:
          type: string
        vehicleType:
          type: string
        brand:
          type: string
        model:
          type: string
        manufactureYear:
          type: integer
        color:
          type: string
        purchaseDate:
          type: string
        purchaseCost:
          type: string
        batteryDetails:
          type: string
        insuranceExpiry:
          type: string
        insuranceIssueDate:
          type: string
        taxExpiry:
          type: string
        serviceDueDate:
          type: string
        lastServiceDate:
          type: string
        lastServiceOdometer:
          type: integer
        servicingPayment:
          type: string
        odometerReading:
          type: string
        status:
          type: string
          enum: [active, maintenance, inactive]
        locationBranch:
          type: string
        gpsInstalled:
          type: string
        gpsNumber:
          type: string
        gpsIdPassword:
          type: string
        scooterBranding:
          type: string
        yangoBrandingDate:
          type: string
        brandingPayment:
          type: string
        brandwrapExpireDate:
          type: string
        bluebookIssueDate:
          type: string
        bluebookExpiryDate:
          type: string

    Rider:
      type: object
      required: [id, fullName, phoneNumber, status]
      properties:
        id:
          type: integer
        fullName:
          type: string
        phoneNumber:
          type: string
        secondaryPhone:
          type: string
        citizenshipNumber:
          type: string
        licenseNumber:
          type: string
        licenseExpiryDate:
          type: string
        address:
          type: string
        emergencyContact:
          type: string
        joiningDate:
          type: string
        employmentType:
          type: string
          enum: [full_time, part_time, contract]
        salaryStructure:
          type: string
        monthlySalary:
          type: string
        dailyRideTarget:
          type: integer
        assignedSupervisor:
          type: string
        securityDeposit:
          type: string
        bankAccountDetails:
          type: string
        status:
          type: string
          enum: [active, inactive]
        createdAt:
          type: string

    CreateRider:
      type: object
      required: [fullName, phoneNumber]
      properties:
        fullName:
          type: string
        phoneNumber:
          type: string
        secondaryPhone:
          type: string
        citizenshipNumber:
          type: string
        licenseNumber:
          type: string
        licenseExpiryDate:
          type: string
        address:
          type: string
        emergencyContact:
          type: string
        joiningDate:
          type: string
        employmentType:
          type: string
          enum: [full_time, part_time, contract]
        salaryStructure:
          type: string
        monthlySalary:
          type: string
        dailyRideTarget:
          type: integer
        assignedSupervisor:
          type: string
        securityDeposit:
          type: string
        bankAccountDetails:
          type: string
        status:
          type: string
          enum: [active, inactive]

    Assignment:
      type: object
      required: [id, riderId, vehicleId, startDate, status]
      properties:
        id:
          type: integer
        riderId:
          type: integer
        vehicleId:
          type: integer
        riderName:
          type: string
        vehiclePlate:
          type: string
        startDate:
          type: string
        endDate:
          type: string
        shiftType:
          type: string
          enum: [morning, day, evening, night]
        status:
          type: string
          enum: [active, ended]
        createdAt:
          type: string

    CreateAssignment:
      type: object
      required: [riderId, vehicleId, startDate]
      properties:
        riderId:
          type: integer
        vehicleId:
          type: integer
        startDate:
          type: string
        endDate:
          type: string
        shiftType:
          type: string
          enum: [morning, day, evening, night]
        status:
          type: string
          enum: [active, ended]

    DailyLog:
      type: object
      required: [id, riderId, vehicleId, englishDate]
      properties:
        id:
          type: integer
        riderId:
          type: integer
        vehicleId:
          type: integer
        riderName:
          type: string
        vehiclePlate:
          type: string
        nepaliDate:
          type: string
        englishDate:
          type: string
        checkInTime:
          type: string
        checkOutTime:
          type: string
        dailyBonusSet:
          type: integer
        totalRidesReceived:
          type: integer
        ridesCompleted:
          type: integer
        acceptanceRate:
          type: string
        bonusTargetCompletion:
          type: boolean
        totalRideDistanceKm:
          type: string
        totalRideHours:
          type: string
        totalAppOnline:
          type: string
        cashAsPerApp:
          type: string
        goalBonus:
          type: string
        promotionBonusOther:
          type: string
        totalIncome:
          type: string
        cashGivenByDriver:
          type: string
        cashTransferredOnline:
          type: string
        cashCheck:
          type: string
        dailyAllowance:
          type: string
        additionalExpenses:
          type: string
        remarks:
          type: string
        createdAt:
          type: string

    CreateDailyLog:
      type: object
      required: [riderId, vehicleId, englishDate]
      properties:
        riderId:
          type: integer
        vehicleId:
          type: integer
        nepaliDate:
          type: string
        englishDate:
          type: string
        checkInTime:
          type: string
        checkOutTime:
          type: string
        dailyBonusSet:
          type: integer
        totalRidesReceived:
          type: integer
        ridesCompleted:
          type: integer
        acceptanceRate:
          type: string
        bonusTargetCompletion:
          type: boolean
        totalRideDistanceKm:
          type: string
        totalRideHours:
          type: string
        totalAppOnline:
          type: string
        cashAsPerApp:
          type: string
        goalBonus:
          type: string
        promotionBonusOther:
          type: string
        totalIncome:
          type: string
        cashGivenByDriver:
          type: string
        cashTransferredOnline:
          type: string
        cashCheck:
          type: string
        dailyAllowance:
          type: string
        additionalExpenses:
          type: string
        remarks:
          type: string

    Attendance:
      type: object
      required: [id, riderId, date, type]
      properties:
        id:
          type: integer
        riderId:
          type: integer
        riderName:
          type: string
        date:
          type: string
        nepaliDate:
          type: string
        type:
          type: string
          enum: [present, absent, leave, holiday, half_day]
        remarks:
          type: string
        vehicleId:
          type: integer
        vehiclePlate:
          type: string
        batteryOut:
          type: string
        batteryIn:
          type: string
        scooterOut:
          type: string
        scooterIn:
          type: string
        riderTimeIn:
          type: string
        riderTimeOut:
          type: string
        distanceIn:
          type: string
        distanceOut:
          type: string
        vehicleOverrideReason:
          type: string
        createdAt:
          type: string

    CreateAttendance:
      type: object
      required: [riderId, date, type]
      properties:
        riderId:
          type: integer
        date:
          type: string
        nepaliDate:
          type: string
        type:
          type: string
          enum: [present, absent, leave, holiday, half_day]
        remarks:
          type: string
        vehicleId:
          type: integer
        batteryOut:
          type: integer
        batteryIn:
          type: integer
        scooterOut:
          type: string
        scooterIn:
          type: string
        riderTimeIn:
          type: string
        riderTimeOut:
          type: string
        distanceIn:
          type: string
        distanceOut:
          type: string
        vehicleOverrideReason:
          type: string

    Maintenance:
      type: object
      required: [id, vehicleId, maintenanceType, date]
      properties:
        id:
          type: integer
        vehicleId:
          type: integer
        vehiclePlate:
          type: string
        maintenanceType:
          type: string
          enum: [battery_service, tire_replacement, brake_service, electrical_repair, accident_repair]
        date:
          type: string
        cost:
          type: string
        description:
          type: string
        nextServiceDate:
          type: string
        createdAt:
          type: string

    CreateMaintenance:
      type: object
      required: [vehicleId, maintenanceType, date]
      properties:
        vehicleId:
          type: integer
        maintenanceType:
          type: string
          enum: [battery_service, tire_replacement, brake_service, electrical_repair, accident_repair]
        date:
          type: string
        cost:
          type: string
        description:
          type: string
        nextServiceDate:
          type: string

    DashboardSummary:
      type: object
      properties:
        totalVehicles:
          type: integer
        activeVehicles:
          type: integer
        inactiveVehicles:
          type: integer
        maintenanceVehicles:
          type: integer
        totalRiders:
          type: integer
        activeRiders:
          type: integer
        totalRidesToday:
          type: integer
        totalIncomeToday:
          type: string
        totalIncomeThisMonth:
          type: string
        avgRidesPerRider:
          type: string
        avgIncomePerVehicle:
          type: string
      required:
        - totalVehicles
        - activeVehicles
        - inactiveVehicles
        - maintenanceVehicles
        - totalRiders
        - activeRiders
        - totalRidesToday
        - totalIncomeToday
        - totalIncomeThisMonth
        - avgRidesPerRider
        - avgIncomePerVehicle

    RiderDashboard:
      type: object
      properties:
        riderId:
          type: integer
        riderName:
          type: string
        totalRidesCompleted:
          type: integer
        avgAcceptanceRate:
          type: string
        avgRidesPerDay:
          type: string
        totalEarnings:
          type: string
        attendanceSummary:
          type: object
          properties:
