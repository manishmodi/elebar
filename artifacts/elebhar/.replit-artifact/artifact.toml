kind = "web"
previewPath = "/"
title = "Elebhar Fleet Management System"
version = "1.0.0"
id = "artifacts/elebhar"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 25335
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/elebhar run dev"

[services.env]
PORT = "25335"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/elebhar", "run", "build"]
publicDir = "artifacts/elebhar/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
