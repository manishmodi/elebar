packages:
  "framer-motion": "Animations for page transitions and sleek interactive states"
  "recharts": "Beautiful data visualizations and charts for the dashboard"
  "date-fns": "Date formatting and manipulation"
  "react-hook-form": "Robust form state management for complex entity forms"
  "@hookform/resolvers": "Zod schema integration for React Hook Form"
  "zod": "Type-safe form validation schemas"

images:
  - path: "artifacts/elebhar/public/images/auth-bg.png"
    description: "A professional, sleek background with abstract subtle geometric shapes in dark blue and teal, suitable for a corporate fleet management software landing page."
    aspect_ratio: "16:9"
  - path: "artifacts/elebhar/public/images/logo-icon.png"
    description: "A modern, minimal app logo icon featuring an abstract 'E' shaped like a road or vehicle wheel in vibrant blue and teal gradient, solid transparent background."
    aspect_ratio: "1:1"

notes:
  - "The UI relies on standard HTML native inputs styled with Tailwind for maximum reliability and accessibility across forms."
  - "The generated @workspace/api-client-react hooks are wrapped locally to add React Query cache invalidation on successful mutations."
