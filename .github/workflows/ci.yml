name: CI / build / deploy

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12", cache: pip, cache-dependency-path: backend/requirements.txt }
      - run: pip install -r backend/requirements.txt
      # Empty DATABASE_URL/REDIS_URL force the hermetic SQLite + eager-Celery path;
      # settings_test.py needs no external services.
      - name: django check
        working-directory: backend
        env: { DATABASE_URL: "", REDIS_URL: "", DEBUG: "1" }
        run: python manage.py check
      # Exit code 5 = "no tests collected" — tolerated until the pytest suite
      # lands (queued in .claude/pending/tests.md); real failures still fail CI.
      - name: pytest
        working-directory: backend
        env: { DATABASE_URL: "", REDIS_URL: "" }
        run: pytest -q || { rc=$?; [ "$rc" -eq 5 ] && echo "no tests yet"; exit $((rc == 5 ? 0 : rc)); }

  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "20", cache: npm, cache-dependency-path: frontend/package-lock.json }
      - run: npm ci
        working-directory: frontend
      - run: npm run build        # tsc && vite build — type-check + bundle
        working-directory: frontend

  # Images are built ONLY for version tags — a `v*` tag is the single artifact
  # that gets built and deployed. Branch pushes / PRs just run the test gate.
  images:
    needs: [backend-tests, frontend-build]
    if: github.ref_type == 'tag'
    runs-on: ubuntu-latest
    permissions: { contents: read, packages: write }
    env:
      REGISTRY: ghcr.io
      TAG: ${{ github.ref_name }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build & push backend
        uses: docker/build-push-action@v6
        with:
          context: backend
          file: backend/Dockerfile.prod
          push: true
          tags: ${{ env.REGISTRY }}/manishmodi/sherpa-backend:${{ env.TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Build & push frontend
        uses: docker/build-push-action@v6
        with:
          context: frontend
          push: true
          tags: ${{ env.REGISTRY }}/manishmodi/sherpa-frontend:${{ env.TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Deploy version tags to the host over SSH (runs deploy/deploy.sh there).
  deploy:
    needs: images
    if: github.ref_type == 'tag'
    runs-on: ubuntu-latest
    environment: production          # gate with a required reviewer in repo settings
    steps:
      - name: SSH deploy
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            cd /opt/sherpa
            git fetch --tags && git checkout ${{ github.ref_name }}
            IMAGE_TAG=${{ github.ref_name }} ./deploy/deploy.sh
