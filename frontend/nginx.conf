# SPA + API reverse proxy. TLS is terminated by the edge (host nginx/Caddy)
# in front of this container.

# Preserve the edge's X-Forwarded-Proto (the hop to this container is plain
# HTTP, so $scheme alone would tell Django "http" and make SECURE_SSL_REDIRECT
# loop). Fall back to $scheme when hit directly.
map $http_x_forwarded_proto $forwarded_proto {
    default $http_x_forwarded_proto;
    ""      $scheme;
}

proxy_set_header Host $host;
proxy_set_header X-Real-IP $remote_addr;
proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
proxy_set_header X-Forwarded-Proto $forwarded_proto;

server {
    listen 80;
    listen [::]:80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;
    # KYC document uploads go through /api/storage/upload/ (backend caps 15 MB)
    client_max_body_size 16m;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # long-cache hashed build assets; never cache index.html
    location /assets/ { expires 1y; add_header Cache-Control "public, immutable"; }
    location = /index.html { add_header Cache-Control "no-store"; }

    # backend: API, Django admin, whitenoise static
    location /api/     { proxy_pass http://api:8000; }
    location /admin/   { proxy_pass http://api:8000; }
    location /static/  { proxy_pass http://api:8000; }
    location /healthz  { proxy_pass http://api:8000; }

    # SPA fallback for client-side routing
    location / { try_files $uri $uri/ /index.html; }
}
