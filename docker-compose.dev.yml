# Dev datastores for the Django+React stack (the legacy TS stack keeps
# docker-compose.yml). Backend and frontend run locally:
#   docker compose -f docker-compose.dev.yml up -d
#   cd backend  && .venv/bin/python manage.py runserver
#   cd frontend && npm run dev
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: sherpa
      POSTGRES_USER: sherpa
      POSTGRES_PASSWORD: sherpa
    ports: ["5432:5432"]
    volumes: [sherpa_pgdata:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sherpa"]
      interval: 10s
      retries: 5

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      retries: 5

volumes:
  sherpa_pgdata:
